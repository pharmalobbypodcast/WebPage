<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>药厂门口｜Live Preview</title>
  <style>
    :root{
      --bg:#efefef;
      --text:#1d2128;
      --muted:#3e4752;
      --card:#f8f6ef;
      --button:#17191d;
      --max:1400px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    a{text-decoration:none;color:inherit}
    .page{min-height:100vh;padding:18px 22px 28px}
    .topbar{
      max-width:var(--max);
      margin:0 auto 22px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
    }
    .topbar-brand{
      font-size:14px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#5a6370;
      white-space:nowrap;
    }
    .topbar-nav{
      display:flex;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
    }
    .topbar-nav a{
      font-size:14px;
      color:#4f5864;
    }
    .topbar-nav a.active{
      color:var(--text);
      font-weight:600;
    }
    .frame{
      max-width:var(--max);
      margin:0 auto;
      min-height:calc(100vh - 36px);
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:56px;
      align-items:center;
    }
    .left{
      padding:24px 0 24px 14px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-height:72vh;
    }
    .brand{
      font-size:14px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#5a6370;
      margin-bottom:28px;
    }
    h1{
      margin:0;
      font-size:48px;
      line-height:1.02;
      font-weight:500;
      letter-spacing:-0.04em;
      max-width:720px;
    }
    .subtitle{
      margin-top:34px;
      max-width:520px;
      font-size:20px;
      line-height:1.45;
      color:var(--muted);
    }
    .actions{
      margin-top:58px;
      display:flex;
      gap:16px;
      flex-wrap:wrap;
    }
    .button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:240px;
      padding:20px 34px;
      border-radius:999px;
      background:var(--button);
      color:white;
      font-size:14px;
      font-weight:600;
      letter-spacing:.06em;
      text-transform:uppercase;
    }
    .button.secondary{
      background:transparent;
      color:var(--text);
      border:1px solid rgba(29,33,40,.18);
    }
    .meta{
      margin-top:24px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      color:#68707b;
      font-size:13px;
      letter-spacing:.03em;
    }
    .right{
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .cover{
      width:100%;
      aspect-ratio:1/1.12;
      background:var(--card);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .cover img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .cover-card{
      width:100%;
      height:100%;
      border-radius:28px;
      background:linear-gradient(180deg,#f4efe6 0%,#e6dfd3 100%);
      display:flex;align-items:center;justify-content:center;
      padding:32px;
      box-shadow:0 30px 60px rgba(0,0,0,.12);
    }
    .cover-inner{
      max-width:420px;
      text-align:left;
      color:#2b2f36;
    }
    .cover-title{
      font-size:32px;
      font-weight:600;
      margin-bottom:10px;
    }
    .cover-sub{
      font-size:14px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#6b7280;
      margin-bottom:20px;
    }
    .cover-body{
      font-size:16px;
      line-height:1.6;
      color:#4b5563;
      margin-bottom:28px;
    }
    .cover-meta{
      font-size:13px;
      color:#9aa3ad;
      letter-spacing:.04em;
    }
    .placeholder:before{
      content:"";
      position:absolute;
      left:50%;
      top:14%;
      transform:translateX(-50%);
      width:56%;
      height:32%;
      border-radius:24px;
      border:2px solid rgba(255,255,255,.55);
      opacity:.7;
    }
    .placeholder:after{
      content:"封面图";
      position:absolute;
      left:50%;
      bottom:10%;
      transform:translateX(-50%);
      font-size:18px;
      color:rgba(255,255,255,.88);
      letter-spacing:.08em;
    }
    .platforms{
      margin-top:34px;
    }
    .platform-label{
      font-size:13px;
      color:#6d7680;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:12px;
    }
    .platform-list{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }
    .platform-link{
      width:48px;
      height:48px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      border:1px solid rgba(29,33,40,.14);
      background:rgba(255,255,255,.42);
      color:#2c3440;
      transition:.18s ease;
    }
    .platform-link:hover{
      background:white;
      transform:translateY(-1px);
    }
    .platform-link svg{
      width:22px;
      height:22px;
      display:block;
    }
    .platform-link:hover{
      background:white;
    }
    .notes{
      max-width:1400px;
      margin:18px auto 0;
      font-size:14px;
      color:#66707a;
    }
    @media (max-width: 1100px){
      .frame{grid-template-columns:1fr;gap:30px}
      .left{min-height:auto;padding:10px 0 0}
      .right{order:-1}
      h1{font-size:52px;max-width:none}
      .subtitle{font-size:20px;max-width:680px}
      .cover{max-width:760px;margin:0 auto}
    }
    @media (max-width: 900px){
      .topbar{align-items:flex-start;flex-direction:column;gap:12px}
      .topbar-nav{gap:14px}
    }
    @media (max-width: 700px){
      .page{padding:14px}
      .frame{gap:22px}
      h1{font-size:38px}
      .subtitle{font-size:17px;margin-top:20px}
      .actions{margin-top:30px}
      .button{min-width:unset;width:100%;padding:18px 24px}
      .brand{margin-bottom:24px}
      .platform-list{gap:10px}
      .platform-link{width:100%;justify-content:flex-start;padding:12px 14px}
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="topbar-brand" href="index.html">药厂门口 | Pharma Lobby</a>
      <nav class="topbar-nav">
        <a class="active" href="index.html">首页</a>
        <a href="about.html">关于我们</a>
        <a href="episodes.html">节目库</a>
        <a href="guest.html">嘉宾合作</a>
        <a href="ask.html">匿名提问</a>
        <a href="contact.html">联系我们</a>
      </nav>
    </header>

    <main class="frame">
      <section class="left">
        <div class="brand">药厂门口 | Pharma Lobby · Podcast</div>
        <h1>行业里的故事，从门口开始说起。</h1>
        <div class="subtitle">
          《药厂门口》是一档聚焦医药行业的对话型播客。<br> 我们拆解新药研发与市场准入背后的真实经历，<br>记录那些实验室外的思维火花。
        </div>
        <div class="actions">
          <a class="button" href="#">立即收听</a>
          <a class="button secondary" href="#">查看节目</a>
        </div>
        <div class="meta">
          <span>新药研发</span>
          <span>·</span>
          <span>临床试验</span>
          <span>·</span>
          <span>市场准入</span>
          <span>·</span>
          <span>职业成长</span>
        </div>

        <div class="platforms">
          <div class="platform-label">收听平台</div>
          <div class="platform-list">
            <a class="platform-link" href="https://podcaster.xiaoyuzhoufm.com/podcasts/67e366fa1c465530de1f9d61/home" target="_blank" aria-label="小宇宙" title="小宇宙">
              <!-- 小宇宙（简化声波圆环） -->
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
                <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.8"/>
                <circle cx="12" cy="12" r="1.2" fill="currentColor"/>
              </svg>
            </a>
            <a class="platform-link" href="https://podcasts.apple.com/us/podcast/%E8%8D%AF%E5%8E%82%E9%97%A8%E5%8F%A3-pharma-lobby/id1815646845" target="_blank" aria-label="Apple Podcasts" title="Apple Podcasts">
              <!-- Apple Podcasts（简化人形+同心圆） -->
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="12" cy="7" r="2.1" fill="currentColor"/>
                <path d="M12 10.8c1.6 0 2.9 1.3 2.9 2.9 0 1.3-.5 3.6-1 5.3-.2.6-.7 1-1.3 1s-1.1-.4-1.3-1c-.5-1.7-1-4-1-5.3 0-1.6 1.3-2.9 2.7-2.9Z" fill="currentColor"/>
                <circle cx="12" cy="12" r="7.2" stroke="currentColor" stroke-width="1.5" opacity=".45"/>
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5" opacity=".22"/>
              </svg>
            </a>
            <a class="platform-link" href="https://open.spotify.com/show/2lYqh3JVPU1uXvU0Bu6FWN?si=aaa55d4718ec4a54" target="_blank" aria-label="Spotify" title="Spotify">
              <!-- Spotify（简化三条声波） -->
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
                <path d="M7.3 10.1c3.1-1 6.7-.8 9.5.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M8.2 13.1c2.4-.7 5.1-.5 7.2.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" opacity=".85"/>
                <path d="M9.1 15.9c1.7-.4 3.6-.3 5 .4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" opacity=".7"/>
              </svg>
            </a>
          </div>
        </div>
      </section>

      <section class="right">
        <div class="cover">
          <!-- 图片占位：你可以替换 src 为你的正式封面 -->
          <!-- ⚠️ 把下面 cover.jpg 换成你上传到 GitHub 仓库里的图片文件名 -->
          <img src="images/cover.jpg" alt="药厂门口封面图" />
        </div>
      </section>
    </main>

    <div class="notes">
      一档不正经聊药厂的正经播客
    </div>
  </div>
</body>
</html>
